<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنجلش هب · التعليم النووي للمصريين 🇪🇬⚡</title>
    
    <!-- جرافيكس ثلاثية و أدوات -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --dark: #0c0c0c;
            --darker: #050505;
            --green: #00f593;
            --green-glow: rgba(0, 245, 147, 0.25);
            --card-bg: #141414;
            --text-dim: #a0a0a0;
            --danger: #ff4757;
            --blue: #1e40af;
            --red: #dc2626;
        }
        
        body {
            font-family: 'Cairo', 'Noto Naskh Arabic', sans-serif;
            background: var(--dark);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.5;
            position: relative;
        }
        
        /* WEBGL canvas */
        #nuke-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -5;
            display: block;
            opacity: 0.9;
        }
        
        .glow-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(0,255,150,0.12) 0%, transparent 60%),
                        radial-gradient(circle at 80% 70%, rgba(0,200,100,0.1) 0%, transparent 60%);
            z-index: -4;
            pointer-events: none;
            animation: glowPulse 8s infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* ====== نافبار احترافي ====== */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(5,5,5,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--green);
            box-shadow: 0 5px 30px rgba(0,245,147,0.2);
            z-index: 1000;
            transform: translateY(-100%);
            padding: 0;
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
        }
        
        /* اللوجو في النافبار */
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            cursor: pointer;
        }
        
        .nav-logo-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            padding: 4px;
            object-fit: contain;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0,245,147,0.3);
        }
        
        .nav-brand:hover .nav-logo-img {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 30px var(--green);
        }
        
        .nav-brand-text {
            display: flex;
            flex-direction: column;
        }
        
        .nav-brand-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--blue);
            line-height: 1.2;
            text-shadow: 0 0 10px rgba(30,64,175,0.3);
        }
        
        .nav-brand-sub {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--red);
            letter-spacing: 0.5px;
        }
        
        /* روابط النافبار */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 30px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            background: transparent;
            border: 1px solid transparent;
        }
        
        .nav-link::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: var(--green);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.4s;
            z-index: -1;
        }
        
        .nav-link:hover::before {
            width: 150px; height: 150px;
        }
        
        .nav-link:hover {
            color: black;
            border-color: var(--green);
            transform: translateY(-2px);
        }
        
        .nav-link i {
            font-size: 1.1rem;
            transition: transform 0.3s;
        }
        
        .nav-link:hover i {
            transform: scale(1.2);
        }
        
        /* زر الموبايل */
        .mobile-toggle {
            display: none;
            background: none;
            border: 2px solid var(--green);
            color: var(--green);
            width: 45px;
            height: 45px;
            border-radius: 10px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mobile-toggle:hover {
            background: var(--green);
            color: black;
        }
        
        /* ====== الهيرو ====== */
        .hero-blast {
            text-align: center; 
            padding: 140px 20px 80px;
            max-width: 1200px; 
            margin: 0 auto;
        }
        
        .hero-logo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: contain;
            background: white;
            padding: 8px;
            margin: 0 auto 25px;
            box-shadow: 0 0 60px var(--green-glow);
            animation: heroLogoPulse 3s ease-in-out infinite;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .hero-logo:hover {
            transform: scale(1.1);
            box-shadow: 0 0 100px var(--green);
        }
        
        @keyframes heroLogoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 60px var(--green-glow); }
            50% { transform: scale(1.03); box-shadow: 0 0 80px var(--green); }
        }
        
        .hero-title {
            font-size: 3.2rem; 
            font-weight: 900; 
            line-height: 1.2;
            opacity: 0; 
            transform: translateY(40px);
        }
        
        .hero-title span {
            color: var(--green);
            text-shadow: 0 0 30px #00ffaa;
            background: linear-gradient(90deg, #00f593, #b0ffd0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .hero-sub {
            font-size: 1.3rem; 
            color: var(--text-dim); 
            margin: 20px auto 40px;
            max-width: 600px; 
            opacity: 0; 
            transform: translateY(30px);
        }
        
        .stats-nuke {
            display: flex; 
            gap: 25px; 
            justify-content: center; 
            flex-wrap: wrap;
        }
        
        .stat-nuke {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0,245,147,0.3);
            backdrop-filter: blur(10px);
            padding: 20px 35px; 
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            opacity: 0; 
            transform: scale(0.9);
            transition: all 0.3s;
        }
        
        .stat-nuke:hover {
            transform: translateY(-5px);
            border-color: var(--green);
            box-shadow: 0 0 40px var(--green-glow);
        }
        
        .stat-nuke .num {
            font-size: 2.5rem; 
            font-weight: 800; 
            color: var(--green);
            text-shadow: 0 0 20px var(--green);
        }
        
        /* ====== بحث ====== */
        .search-nuke {
            background: rgba(20,20,20,0.7); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--green); 
            border-radius: 70px;
            margin: 40px auto; 
            max-width: 800px; 
            padding: 12px 20px;
            display: flex; 
            align-items: center;
            box-shadow: 0 0 60px var(--green-glow);
            transition: all 0.3s;
        }
        
        .search-nuke:focus-within {
            box-shadow: 0 0 80px var(--green);
            transform: scale(1.02);
        }
        
        .search-nuke input {
            background: transparent; 
            border: none;
            color: white; 
            font-size: 1.2rem; 
            padding: 12px 15px;
            flex: 1; 
            font-family: 'Cairo'; 
            outline: none;
        }
        
        .search-nuke input::placeholder {
            color: var(--text-dim);
        }
        
        .search-nuke button {
            background: var(--green); 
            border: none;
            width: 60px; 
            height: 60px; 
            border-radius: 50%;
            font-size: 1.5rem; 
            color: black; 
            cursor: pointer;
            transition: 0.3s; 
            box-shadow: 0 0 40px #00f593;
        }
        
        .search-nuke button:hover { 
            transform: rotate(360deg) scale(1.1);
            box-shadow: 0 0 60px #00ffaa;
        }
        
        /* ====== تبويبات ====== */
        .category-tabs-nuke {
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px;
            justify-content: center; 
            margin: 30px 0 50px;
        }
        
        .cat-btn {
            background: #1d1d1d; 
            border: 1px solid #2a2a2a;
            color: #ccc; 
            padding: 12px 25px; 
            border-radius: 50px;
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            font-size: 0.9rem;
        }
        
        .cat-btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: var(--green);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.5s;
            z-index: -1;
        }
        
        .cat-btn.active::before, .cat-btn:hover::before {
            width: 300px; height: 300px;
        }
        
        .cat-btn.active {
            background: var(--green); 
            color: black; 
            border-color: var(--green);
            box-shadow: 0 0 30px #00f593;
        }
        
        .cat-btn:hover:not(.active) {
            border-color: var(--green);
            color: var(--green);
        }
        
        /* ====== كروت ====== */
        .cards-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px; 
            max-width: 1400px; 
            margin: 30px auto 80px;
            padding: 0 20px;
        }
        
        .nuke-card {
            background: #1a1a1a; 
            border-radius: 30px;
            border: 1px solid #2e2e2e; 
            overflow: hidden;
            transition: 0.4s; 
            cursor: pointer;
            box-shadow: 0 20px 30px -10px black;
            position: relative; 
            backdrop-filter: blur(5px);
        }
        
        .nuke-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,245,147,0.1), transparent);
            transition: 0.5s;
        }
        
        .nuke-card:hover::before {
            left: 100%;
        }
        
        .nuke-card:hover {
            border-color: var(--green); 
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px -5px #00f59355;
        }
        
        .card-inner {
            padding: 25px; 
            background: rgba(10,10,10,0.6);
            position: relative; 
            z-index: 2;
        }
        
        .badge-cat {
            background: #2f2f2f; 
            color: var(--green);
            padding: 5px 15px; 
            border-radius: 30px;
            font-size: 0.75rem; 
            font-weight: 700; 
            display: inline-block;
            margin-bottom: 12px; 
            border: 1px solid #3f3f3f;
            text-transform: uppercase;
        }
        
        .word-main {
            font-size: 2.8rem; 
            font-weight: 900; 
            margin: 8px 0 5px;
            background: linear-gradient(135deg, #fff, #00f593);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .phonetic {
            color: #888; 
            font-family: 'Courier New', monospace; 
            font-size: 1rem;
            direction: ltr; 
            margin-bottom: 15px;
            background: rgba(0,245,147,0.1);
            padding: 4px 12px;
            border-radius: 15px;
            display: inline-block;
        }
        
        .meaning-arabic {
            font-size: 2rem; 
            font-weight: 800; 
            color: var(--green);
            margin: 10px 0; 
            text-shadow: 0 0 20px #00f593;
            font-family: 'Noto Naskh Arabic';
        }
        
        .example {
            background: linear-gradient(135deg, #222, #1a1a1a);
            padding: 15px; 
            border-radius: 15px;
            font-size: 0.9rem; 
            border-right: 3px solid var(--green);
            margin: 15px 0; 
            direction: ltr; 
            text-align: left;
            color: #ccc;
            font-style: italic;
            position: relative;
        }
        
        .example::before {
            content: '"';
            position: absolute;
            top: -8px; left: 10px;
            font-size: 3rem;
            color: var(--green);
            opacity: 0.3;
            font-family: serif;
        }
        
        .audio-row {
            display: flex; 
            gap: 10px; 
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .audio-btn {
            background: transparent; 
            border: 1.5px solid var(--green);
            color: white; 
            padding: 10px 18px; 
            border-radius: 30px;
            font-weight: 600; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 0.85rem;
            position: relative;
            overflow: hidden;
        }
        
        .audio-btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: var(--green);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.5s;
            z-index: -1;
        }
        
        .audio-btn:hover::before {
            width: 200px; height: 200px;
        }
        
        .audio-btn:hover {
            color: black; 
            box-shadow: 0 0 30px #00f593;
            transform: translateY(-2px);
        }
        
        .audio-btn.playing {
            animation: audioPulse 1s infinite;
            background: var(--green);
            color: black;
        }
        
        @keyframes audioPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,245,147,0.7); }
            50% { box-shadow: 0 0 0 15px rgba(0,245,147,0); }
        }
        
        .fav-btn {
            background: none; 
            border: none; 
            color: #666;
            font-size: 1.5rem; 
            cursor: pointer; 
            float: left;
            transition: 0.3s; 
            width: 40px; 
            height: 40px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-radius: 50%;
        }
        
        .fav-btn:hover {
            background: rgba(255,77,109,0.1);
        }
        
        .fav-btn.active { 
            color: #ff4757; 
            animation: heartBeat 0.5s;
            text-shadow: 0 0 20px #ff4757;
        }
        
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
            75% { transform: scale(1.2); }
        }
        
        /* ====== بروجرس ====== */
        .progress-nuke {
            position: fixed; 
            bottom: 20px; 
            right: 50%; 
            transform: translateX(50%);
            background: #0f0f0f; 
            border: 1px solid var(--green);
            backdrop-filter: blur(15px); 
            padding: 15px 35px;
            border-radius: 60px; 
            display: flex; 
            gap: 25px; 
            align-items: center;
            z-index: 999; 
            box-shadow: 0 0 50px var(--green-glow);
        }
        
        .progress-nuke span {
            font-weight: 700;
            color: var(--green);
            font-size: 0.9rem;
        }
        
        .progress-nuke .bar {
            width: 180px; 
            height: 10px; 
            background: #2c2c2c;
            border-radius: 20px; 
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .bar-fill {
            height: 100%; 
            background: linear-gradient(90deg, #00f593, #00ffaa);
            width: 0%;
            box-shadow: 0 0 20px #00f593;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
        }
        
        /* ====== مودال ====== */
        .quiz-nuke-modal {
            display: none; 
            position: fixed; 
            inset: 0;
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(20px);
            z-index: 3000; 
            justify-content: center; 
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .quiz-nuke-modal.active {
            opacity: 1;
        }
        
        .quiz-panel {
            background: linear-gradient(135deg, #111, #0a0a0a);
            border: 2px solid var(--green);
            border-radius: 40px; 
            padding: 40px; 
            max-width: 650px;
            width: 90%; 
            text-align: center; 
            box-shadow: 0 0 100px var(--green-glow);
            transform: scale(0.8) translateY(50px);
            transition: all 0.5s;
        }
        
        .quiz-nuke-modal.active .quiz-panel {
            transform: scale(1) translateY(0);
        }
        
        .quiz-option {
            background: #222; 
            padding: 18px; 
            margin: 10px;
            border-radius: 40px; 
            font-size: 1.2rem; 
            cursor: pointer;
            border: 2px solid #3d3d3d; 
            transition: 0.3s;
            font-weight: 600;
        }
        
        .quiz-option:hover { 
            background: var(--green); 
            color: black; 
            border-color: var(--green);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--green-glow);
        }
        
        .quiz-option.correct { 
            background: var(--green); 
            color: black;
            border-color: var(--green);
            animation: correctPop 0.5s;
            box-shadow: 0 0 40px #00f593;
        }
        
        .quiz-option.wrong { 
            background: var(--danger); 
            color: white;
            border-color: var(--danger);
            animation: shake 0.5s;
        }
        
        @keyframes correctPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        /* ====== FAB ====== */
        .fab-nuke {
            position: fixed; 
            bottom: 100px; 
            left: 25px;
            background: var(--green); 
            color: black; 
            width: 60px; 
            height: 60px;
            border-radius: 50%; 
            border: none; 
            font-size: 1.5rem;
            box-shadow: 0 0 50px var(--green); 
            cursor: pointer;
            transition: 0.3s; 
            z-index: 900;
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        
        .fab-nuke:hover { 
            transform: rotate(360deg) scale(1.2);
            box-shadow: 0 0 80px #00ffaa;
        }
        
        /* ====== لودر ====== */
        .loader-nuke {
            position: fixed; 
            inset: 0; 
            background: black; 
            z-index: 9999;
            display: flex; 
            justify-content: center; 
            align-items: center;
            flex-direction: column; 
            gap: 20px;
            transition: opacity 0.5s;
        }
        
        .loader-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: white;
            padding: 8px;
            animation: loaderPulse 1.5s infinite;
            box-shadow: 0 0 60px var(--green);
        }
        
        @keyframes loaderPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 60px var(--green); }
            50% { transform: scale(1.1); box-shadow: 0 0 100px var(--green); }
        }
        
        .hidden { opacity: 0; pointer-events: none; }
        
        /* ====== ريسبونسيف ====== */
        @media (max-width: 992px) {
            .nav-links {
                position: fixed;
                top: 80px;
                right: -100%;
                width: 280px;
                height: calc(100vh - 80px);
                background: rgba(5,5,5,0.98);
                flex-direction: column;
                padding: 30px 20px;
                gap: 15px;
                transition: right 0.4s;
                border-left: 2px solid var(--green);
            }
            
            .nav-links.active {
                right: 0;
            }
            
            .nav-link {
                width: 100%;
                justify-content: center;
                padding: 15px;
            }
            
            .mobile-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .hero-title { font-size: 2.2rem; }
            .hero-logo { width: 120px; height: 120px; }
            .cards-grid { grid-template-columns: 1fr; }
            .progress-nuke { width: 95%; padding: 12px 20px; }
            .progress-nuke .bar { width: 120px; }
        }
        
        @media (max-width: 576px) {
            .nav-container { padding: 10px 15px; }
            .nav-brand-title { font-size: 1.1rem; }
            .nav-brand-sub { font-size: 0.75rem; }
            .nav-logo-img { width: 40px; height: 40px; }
            .hero-title { font-size: 1.8rem; }
            .stat-nuke { padding: 15px 25px; }
            .stat-nuke .num { font-size: 2rem; }
        }
        
        /* ====== سكرول بار ====== */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--darker);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--green);
            border-radius: 5px;
            box-shadow: 0 0 10px var(--green);
        }
        
        ::selection {
            background: var(--green);
            color: black;
        }
    </style>
</head>
<body>
    <canvas id="nuke-canvas"></canvas>
    <div class="glow-overlay"></div>

    <!-- لودر -->
    <div class="loader-nuke" id="loader">
        <img src="logo.png" alt="Logo" class="loader-logo">
        <h2 style="color: #00f593; font-size: 1.3rem;">جاري التحميل...</h2>
    </div>

    <!-- ====== نافبار احترافي ====== -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <!-- اللوجو -->
            <a href="#" class="nav-brand" onclick="scrollToTop(); return false;">
                <img src="logo.png" alt="English Vocabulary Hub" class="nav-logo-img">
                <div class="nav-brand-text">
                    <span class="nav-brand-title">English</span>
                    <span class="nav-brand-sub">Vocabulary Hub</span>
                </div>
            </a>
            
            <!-- روابط -->
            <div class="nav-links" id="navLinks">
                <a href="#" class="nav-link" onclick="showFavs(); return false;">
                    <i class="fas fa-heart"></i>
                    <span>المفضلة</span>
                </a>
                <a href="#" class="nav-link" onclick="openNukeQuiz(); return false;">
                    <i class="fas fa-bomb"></i>
                    <span>التحدي</span>
                </a>
                <a href="#" class="nav-link" onclick="scrollToCards(); return false;">
                    <i class="fas fa-layer-group"></i>
                    <span>الكلمات</span>
                </a>
                <a href="#" class="nav-link" onclick="resetNuke(); return false;">
                    <i class="fas fa-redo"></i>
                    <span>إعادة</span>
                </a>
            </div>
            
            <!-- زر الموبايل -->
            <button class="mobile-toggle" onclick="toggleMobileMenu()">
                <i class="fas fa-bars" id="menuIcon"></i>
            </button>
        </div>
    </nav>

    <!-- ====== الهيرو ====== -->
    <section class="hero-blast">
        <img src="logo.png" alt="Logo" class="hero-logo" onclick="spinLogo()">
        <h1 class="hero-title"><span>انفجر</span> في اللغة الإنجليزية</h1>
        <p class="hero-sub">منصة English Vocabulary Hub - أكتر من 5000 كلمة مع النطق والترجمة</p>
        
        <div class="stats-nuke">
            <div class="stat-nuke">
                <div class="num" id="totalWords">0</div>
                <div style="color: #888; font-size: 0.85rem;">إجمالي الكلمات</div>
            </div>
            <div class="stat-nuke">
                <div class="num" id="learnedCount">0</div>
                <div style="color: #888; font-size: 0.85rem;">تم تعلمها</div>
            </div>
            <div class="stat-nuke">
                <div class="num" id="bookmarkCount">0</div>
                <div style="color: #888; font-size: 0.85rem;">المفضلة</div>
            </div>
        </div>
    </section>

    <!-- ====== بحث ====== -->
    <div style="max-width:1200px; margin:0 auto; padding: 0 20px;">
        <div class="search-nuke">
            <input type="text" id="nukeSearch" placeholder="ابحث في الكلمات..." onkeyup="searchNuke()">
            <button onclick="searchNuke()"><i class="fas fa-search"></i></button>
        </div>
        
        <div class="category-tabs-nuke">
            <button class="cat-btn active" data-cat="all">الكل</button>
            <button class="cat-btn" data-cat="beginner">🌱 مبتدئ</button>
            <button class="cat-btn" data-cat="intermediate">🚀 متوسط</button>
            <button class="cat-btn" data-cat="advanced">👑 متقدم</button>
            <button class="cat-btn" data-cat="business">💼 أعمال</button>
            <button class="cat-btn" data-cat="academic">🎓 أكاديمي</button>
        </div>
    </div>

    <!-- ====== الكروت ====== -->
    <div id="cardsContainer" class="cards-grid"></div>

    <!-- ====== بروجرس ====== -->
    <div class="progress-nuke">
        <span>⚡ التقدم</span>
        <div class="bar"><div class="bar-fill" id="progressFill"></div></div>
        <span id="progressPercent">0%</span>
    </div>

    <!-- ====== FAB ====== -->
    <button class="fab-nuke" onclick="randomWordNuke()" title="كلمة عشوائية">
        <i class="fas fa-dice"></i>
    </button>

    <!-- ====== مودال ====== -->
    <div class="quiz-nuke-modal" id="quizModal" onclick="if(event.target===this) closeQuiz()">
        <div class="quiz-panel">
            <h2 style="color:#00f593; font-size: 2rem; margin-bottom: 20px;">
                <i class="fas fa-bomb"></i> تحدي الانشطار
            </h2>
            <div id="quizQuestion" style="font-size:1.5rem; margin:25px 0; min-height: 60px;"></div>
            <div id="quizOptions"></div>
            <div id="quizScoreDisplay" style="margin-top:20px; color: #00f593;"></div>
            <button class="nav-link" id="nextQuizBtn" onclick="nextNukeQuestion()" style="margin-top: 25px; border: 2px solid var(--green); display: inline-flex;">
                ابدأ التحدي
            </button>
        </div>
    </div>

    <script>
        // البيانات
        const vocabNuke = {
            beginner: [
                { word: "Hello", meaning: "مرحباً", phonetic: "/həˈloʊ/", example: "Hello, how are you today?" },
                { word: "Thank you", meaning: "شكراً", phonetic: "/ˈθæŋk juː/", example: "Thank you very much!" },
                { word: "Please", meaning: "من فضلك", phonetic: "/pliːz/", example: "Please sit down." },
                { word: "Sorry", meaning: "آسف", phonetic: "/ˈsɒri/", example: "I'm sorry for being late." },
                { word: "Yes", meaning: "نعم", phonetic: "/jes/", example: "Yes, I understand." },
                { word: "No", meaning: "لا", phonetic: "/noʊ/", example: "No, thank you." },
                { word: "Good", meaning: "جيد", phonetic: "/ɡʊd/", example: "Good morning everyone!" },
                { word: "Bad", meaning: "سيء", phonetic: "/bæd/", example: "Smoking is bad for health." },
                { word: "Big", meaning: "كبير", phonetic: "/bɪɡ/", example: "They live in a big house." },
                { word: "Small", meaning: "صغير", phonetic: "/smɔːl/", example: "I prefer small cars." },
                { word: "Happy", meaning: "سعيد", phonetic: "/ˈhæpi/", example: "She looks very happy today." },
                { word: "Sad", meaning: "حزين", phonetic: "/sæd/", example: "Why are you so sad?" }
            ],
            intermediate: [
                { word: "Confident", meaning: "واثق", phonetic: "/ˈkɒnfɪdənt/", example: "Be confident in yourself." },
                { word: "Creative", meaning: "مبدع", phonetic: "/kriˈeɪtɪv/", example: "Artists are creative people." },
                { word: "Patient", meaning: "صبور", phonetic: "/ˈpeɪʃnt/", example: "Teachers must be patient." },
                { word: "Honest", meaning: "صادق", phonetic: "/ˈɒnɪst/", example: "He is honest and reliable." },
                { word: "Manager", meaning: "مدير", phonetic: "/ˈmænɪdʒər/", example: "The manager approved the project." },
                { word: "Meeting", meaning: "اجتماع", phonetic: "/ˈmiːtɪŋ/", example: "We have a meeting at 10." },
                { word: "Deadline", meaning: "موعد نهائي", phonetic: "/ˈdedlaɪn/", example: "The deadline is tomorrow!" },
                { word: "Salary", meaning: "راتب", phonetic: "/ˈsæləri/", example: "My salary increased this year." }
            ],
            advanced: [
                { word: "Innovative", meaning: "مبتكر", phonetic: "/ˈɪnəveɪtɪv/", example: "Apple is an innovative company." },
                { word: "Resilient", meaning: "مرن نفسياً", phonetic: "/rɪˈzɪliənt/", example: "Resilient people recover fast." },
                { word: "Paradigm", meaning: "نموذج", phonetic: "/ˈpærədaɪm/", example: "This is a new paradigm." },
                { word: "Sustainable", meaning: "مستدام", phonetic: "/səˈsteɪnəbl/", example: "We need sustainable energy." },
                { word: "Leadership", meaning: "قيادة", phonetic: "/ˈliːdərʃɪp/", example: "Good leadership is essential." },
                { word: "Initiative", meaning: "مبادرة", phonetic: "/ɪˈnɪʃətɪv/", example: "Show initiative at work." }
            ],
            business: [
                { word: "Entrepreneur", meaning: "رائد أعمال", phonetic: "/ˌɒntrəprəˈnɜːr/", example: "He is a successful entrepreneur." },
                { word: "Revenue", meaning: "إيرادات", phonetic: "/ˈrevənjuː/", example: "Company revenue increased." },
                { word: "Profit", meaning: "ربح", phonetic: "/ˈprɒfɪt/", example: "We made a good profit." },
                { word: "Investment", meaning: "استثمار", phonetic: "/ɪnˈvestmənt/", example: "Real estate is a good investment." }
            ],
            academic: [
                { word: "Thesis", meaning: "أطروحة", phonetic: "/ˈθiːsɪs/", example: "She wrote her thesis on AI." },
                { word: "Dissertation", meaning: "رسالة دكتوراه", phonetic: "/ˌdɪsərˈteɪʃn/", example: "His dissertation was brilliant." },
                { word: "Methodology", meaning: "منهجية", phonetic: "/ˌmeθəˈdɒlədʒi/", example: "Explain your methodology." },
                { word: "Bibliography", meaning: "قائمة مراجع", phonetic: "/ˌbɪbliˈɒɡrəfi/", example: "Include a bibliography." }
            ]
        };

        let allWordsNuke = [];
        for (let cat in vocabNuke) {
            vocabNuke[cat].forEach((item, idx) => {
                allWordsNuke.push({...item, category: cat, index: idx, id: `${cat}-${idx}`});
            });
        }

        let learnedNuke = JSON.parse(localStorage.getItem('nukeLearned')) || [];
        let favNuke = JSON.parse(localStorage.getItem('nukeFav')) || [];
        let quizIndex = 0, quizScore = 0, quizQuestions = [];

        function updateNukeStats() {
            document.getElementById('totalWords').textContent = allWordsNuke.length;
            document.getElementById('learnedCount').textContent = learnedNuke.length;
            document.getElementById('bookmarkCount').textContent = favNuke.length;
            let percent = Math.round((learnedNuke.length / allWordsNuke.length)*100) || 0;
            document.getElementById('progressFill').style.width = percent+'%';
            document.getElementById('progressPercent').textContent = percent+'%';
        }

        function renderNukeCards(filterCat = 'all', search='') {
            let container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            let filtered = allWordsNuke.filter(w => 
                (filterCat === 'all' || w.category === filterCat) &&
                (w.word.toLowerCase().includes(search) || w.meaning.includes(search))
            );
            
            filtered.forEach(w => {
                let isFav = favNuke.includes(w.id);
                let card = document.createElement('div');
                card.className = 'nuke-card';
                card.dataset.id = w.id;
                card.innerHTML = `
                    <div class="card-inner">
                        <button class="fav-btn ${isFav ? 'active':''}" onclick="toggleFavNuke('${w.id}', this)">
                            <i class="fa${isFav ? 's' : 'r'} fa-heart"></i>
                        </button>
                        <span class="badge-cat">${w.category}</span>
                        <div class="word-main">${w.word}</div>
                        <div class="phonetic">${w.phonetic}</div>
                        <div class="meaning-arabic">${w.meaning}</div>
                        <div class="example">${w.example}</div>
                        <div class="audio-row">
                            <span class="audio-btn" onclick="speakNuke('${w.word}', 'UK English Male', event)">
                                <i class="fas fa-volume-up"></i> UK
                            </span>
                            <span class="audio-btn" onclick="speakNuke('${w.word}', 'US English Female', event)">
                                <i class="fas fa-flag-usa"></i> US
                            </span>
                            <span class="audio-btn" onclick="speakNuke('${w.example}', 'UK English Male', event)">
                                <i class="fas fa-play"></i> مثال
                            </span>
                        </div>
                    </div>
                `;
                container.appendChild(card);

                if (!learnedNuke.includes(w.id)) {
                    learnedNuke.push(w.id);
                    localStorage.setItem('nukeLearned', JSON.stringify(learnedNuke));
                }
            });
            updateNukeStats();
            gsap.from('.nuke-card', {opacity:0, y:40, stagger:0.05, duration:0.4});
        }

        function speakNuke(text, voice, e) {
            e.stopPropagation();
            const btn = e.currentTarget;
            btn.classList.add('playing');
            responsiveVoice.speak(text, voice, {
                rate: 0.9, 
                onend: () => btn.classList.remove('playing')
            });
        }

        window.toggleFavNuke = function(id, btn) {
            if (favNuke.includes(id)) {
                favNuke = favNuke.filter(f => f !== id);
                btn.innerHTML = '<i class="far fa-heart"></i>';
                btn.classList.remove('active');
            } else {
                favNuke.push(id);
                btn.innerHTML = '<i class="fas fa-heart"></i>';
                btn.classList.add('active');
                confetti({
                    particleCount: 50,
                    spread: 60,
                    origin: { y: 0.6 },
                    colors: ['#00f593', '#00ffaa']
                });
            }
            localStorage.setItem('nukeFav', JSON.stringify(favNuke));
            updateNukeStats();
        }

        window.searchNuke = function() {
            let term = document.getElementById('nukeSearch').value.toLowerCase();
            let cat = document.querySelector('.cat-btn.active')?.dataset.cat || 'all';
            renderNukeCards(cat, term);
        }

        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderNukeCards(btn.dataset.cat, document.getElementById('nukeSearch').value.toLowerCase());
            });
        });

        window.showFavs = function() {
            renderNukeCards('all', '');
            setTimeout(() => {
                document.querySelectorAll('.nuke-card').forEach(c => {
                    if (!favNuke.includes(c.dataset.id)) {
                        gsap.to(c, {opacity: 0, scale: 0.8, duration: 0.3, onComplete: () => c.style.display = 'none'});
                    }
                });
            }, 100);
            closeMobileMenu();
        }

        window.spinLogo = function() {
            gsap.to('.hero-logo', {rotation: 360, duration: 0.8, ease: "back.out(1.7)", onComplete: () => {
                gsap.set('.hero-logo', {rotation: 0});
            }});
            confetti({
                particleCount: 80,
                spread: 100,
                origin: { y: 0.3 },
                colors: ['#1e40af', '#dc2626', '#00f593']
            });
        }

        window.randomWordNuke = function() {
            let r = allWordsNuke[Math.floor(Math.random() * allWordsNuke.length)];
            responsiveVoice.speak(r.word, "UK English Male");
            setTimeout(() => responsiveVoice.speak(r.meaning, "Arabic Female"), 800);
        }

        window.openNukeQuiz = function() {
            const modal = document.getElementById('quizModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            quizIndex = 0; quizScore = 0;
            quizQuestions = allWordsNuke.sort(() => 0.5 - Math.random()).slice(0, 5);
            document.getElementById('nextQuizBtn').innerText = 'ابدأ';
            showQuizQ();
            closeMobileMenu();
        }

        function closeQuiz() {
            const modal = document.getElementById('quizModal');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function showQuizQ() {
            if (quizIndex >= quizQuestions.length) {
                document.getElementById('quizQuestion').innerHTML = `
                    <div style="font-size: 3rem; margin-bottom: 15px;">🎉</div>
                    <div style="color: #00f593; font-size: 1.8rem;">${quizScore}/${quizQuestions.length}</div>
                `;
                document.getElementById('quizOptions').innerHTML = '';
                document.getElementById('nextQuizBtn').innerText = 'تحدي جديد';
                if(quizScore === quizQuestions.length) confetti({particleCount: 200, spread: 100});
                return;
            }
            
            let q = quizQuestions[quizIndex];
            let opts = [q.meaning];
            while(opts.length < 4) {
                let rand = allWordsNuke[Math.floor(Math.random() * allWordsNuke.length)].meaning;
                if(!opts.includes(rand)) opts.push(rand);
            }
            opts.sort(() => Math.random() - 0.5);
            
            document.getElementById('quizQuestion').innerHTML = `
                <div style="color: #888; font-size: 0.9rem; margin-bottom: 10px;">السؤال ${quizIndex + 1} من 5</div>
                ما معنى: <span style="color: #00f593; font-size: 1.6rem; display: block; margin-top: 8px;">${q.word}</span>
            `;
            
            document.getElementById('quizOptions').innerHTML = opts.map(opt => 
                `<div class="quiz-option" onclick="selectQuiz('${opt}', '${q.meaning}')">${opt}</div>`
            ).join('');
            
            document.getElementById('nextQuizBtn').innerText = 'التالي';
            document.getElementById('quizScoreDisplay').innerHTML = `النقاط: ${quizScore}`;
        }

        window.selectQuiz = function(selected, correct) {
            document.querySelectorAll('.quiz-option').forEach(o => o.style.pointerEvents = 'none');
            if (selected === correct) {
                event.target.classList.add('correct');
                quizScore++;
                confetti({particleCount: 60, spread: 50, origin: { y: 0.6 }});
            } else {
                event.target.classList.add('wrong');
                document.querySelectorAll('.quiz-option').forEach(o => {
                    if(o.textContent === correct) o.classList.add('correct');
                });
            }
            setTimeout(() => { quizIndex++; showQuizQ(); }, 1200);
        }

        window.nextNukeQuestion = function() {
            if(quizIndex >= quizQuestions.length) {
                quizQuestions = allWordsNuke.sort(() => 0.5 - Math.random()).slice(0, 5);
                quizIndex = 0; quizScore = 0;
            }
            showQuizQ();
        }

        window.resetNuke = function() {
            if(confirm('هل تريد إعادة تعيين كل التقدم؟')) {
                localStorage.clear();
                learnedNuke = []; favNuke = [];
                updateNukeStats();
                renderNukeCards('all', '');
                closeMobileMenu();
            }
        }

        window.scrollToTop = function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            closeMobileMenu();
        }

        window.scrollToCards = function() {
            document.getElementById('cardsContainer').scrollIntoView({ behavior: 'smooth' });
            closeMobileMenu();
        }

        // موبايل مينو
        function toggleMobileMenu() {
            const navLinks = document.getElementById('navLinks');
            const menuIcon = document.getElementById('menuIcon');
            navLinks.classList.toggle('active');
            menuIcon.className = navLinks.classList.contains('active') ? 'fas fa-times' : 'fas fa-bars';
        }

        function closeMobileMenu() {
            document.getElementById('navLinks').classList.remove('active');
            document.getElementById('menuIcon').className = 'fas fa-bars';
        }

        // WebGL
        function initNukeCanvas() {
            const canvas = document.getElementById('nuke-canvas');
            const renderer = new THREE.WebGLRenderer({canvas, alpha: true, antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 2000;
            const posArray = new Float32Array(particlesCount * 3);
            
            for(let i = 0; i < particlesCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 100;
            }
            
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            
            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.15,
                color: 0x00f593,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending
            });
            
            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);
            
            let mouseX = 0, mouseY = 0;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });
            
            function animate() {
                requestAnimationFrame(animate);
                particlesMesh.rotation.x += 0.0003;
                particlesMesh.rotation.y += 0.0005;
                particlesMesh.rotation.x += mouseY * 0.0003;
                particlesMesh.rotation.y += mouseX * 0.0003;
                renderer.render(scene, camera);
            }
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // بدء
        window.onload = function() {
            initNukeCanvas();
            renderNukeCards('all', '');
            
            gsap.to('#navbar', {y: 0, duration: 0.6, ease: "power3.out"});
            gsap.to('.hero-logo', {scale: 1, opacity: 1, duration: 0.8, delay: 0.3, ease: "back.out(1.7)"});
            gsap.to('.hero-title', {opacity: 1, y: 0, duration: 0.8, delay: 0.5});
            gsap.to('.hero-sub', {opacity: 1, y: 0, duration: 0.8, delay: 0.7});
            gsap.to('.stat-nuke', {opacity: 1, scale: 1, stagger: 0.15, delay: 0.9});
            
            setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1500);
        }
    </script>
</body>
</html>

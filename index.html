<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنجلش هب · التعليم النووي للمصريين 🇪🇬⚡</title>
    
    <!-- جرافيكس ثلاثية و أدوات -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --dark: #0c0c0c;
            --darker: #050505;
            --green: #00f593;
            --green-glow: rgba(0, 245, 147, 0.25);
            --green-neon: #00ffaa;
            --card-bg: #141414;
            --text-dim: #a0a0a0;
            --danger: #ff4757;
            --warning: #ffa502;
        }
        
        body {
            font-family: 'Cairo', 'Noto Naskh Arabic', sans-serif;
            background: var(--dark);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.5;
            position: relative;
        }
        
        /* WEBGL canvas خلفية نووية */
        #nuke-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -5;
            display: block;
            opacity: 0.9;
        }
        
        /* طبقات إشعاع خضراء */
        .glow-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(0,255,150,0.12) 0%, transparent 60%),
                        radial-gradient(circle at 80% 70%, rgba(0,200,100,0.1) 0%, transparent 60%),
                        radial-gradient(circle at 50% 20%, rgba(0,245,147,0.08) 0%, transparent 50%);
            z-index: -4;
            pointer-events: none;
            animation: glowPulse 8s infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* هيدر زجاجي */
        .blast-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(5,5,5,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--green);
            box-shadow: 0 0 30px var(--green-glow);
            padding: 15px 40px;
            z-index: 1000;
            transform: translateY(-100%);
        }
        
        .header-inner {
            max-width: 1500px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .logo-nuke {
            display: flex; align-items: center; gap: 15px;
            font-size: 2rem; font-weight: 900;
        }
        
        .logo-icon {
            background: linear-gradient(145deg, #00f593, #00b56e);
            width: 60px; height: 60px;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px #00f593;
            animation: morph 4s infinite;
            font-size: 1.8rem;
        }
        
        @keyframes morph {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            50% { border-radius: 70% 30% 30% 70% / 60% 40% 60% 40%; }
            100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
        }
        
        .nav-btn {
            background: transparent;
            border: 1.5px solid var(--green);
            color: white; padding: 12px 28px;
            border-radius: 40px; font-weight: 700;
            transition: 0.25s; cursor: pointer;
            font-family: 'Cairo'; margin: 0 5px;
            backdrop-filter: blur(5px);
            display: inline-flex; align-items: center; gap: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .nav-btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: var(--green);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.5s;
            z-index: -1;
        }
        
        .nav-btn:hover::before {
            width: 300px; height: 300px;
        }
        
        .nav-btn:hover {
            color: black; box-shadow: 0 0 50px #00f593;
            transform: scale(1.07);
        }
        
        /* الهيرو */
        .hero-blast {
            text-align: center; padding: 180px 20px 100px;
            max-width: 1200px; margin: 0 auto;
        }
        
        .hero-title {
            font-size: 4.2rem; font-weight: 900; line-height: 1.2;
            opacity: 0; transform: translateY(40px);
        }
        
        .hero-title span {
            color: var(--green);
            text-shadow: 0 0 30px #00ffaa;
            background: linear-gradient(90deg, #00f593, #b0ffd0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .hero-sub {
            font-size: 1.5rem; color: var(--text-dim); margin: 30px auto 40px;
            max-width: 700px; opacity: 0; transform: translateY(30px);
        }
        
        .stats-nuke {
            display: flex; gap: 30px; justify-content: center; flex-wrap: wrap;
        }
        
        .stat-nuke {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0,245,147,0.3);
            backdrop-filter: blur(10px);
            padding: 25px 45px; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            opacity: 0; transform: scale(0.9);
            transition: all 0.3s;
        }
        
        .stat-nuke:hover {
            transform: translateY(-5px);
            border-color: var(--green);
            box-shadow: 0 0 40px var(--green-glow);
        }
        
        .stat-nuke .num {
            font-size: 3rem; font-weight: 800; color: var(--green);
            text-shadow: 0 0 20px var(--green);
        }
        
        /* بحث وتبويب */
        .search-nuke {
            background: rgba(20,20,20,0.7); backdrop-filter: blur(20px);
            border: 1px solid var(--green); border-radius: 70px;
            margin: 60px auto; max-width: 900px; padding: 15px 25px;
            display: flex; align-items: center;
            box-shadow: 0 0 60px var(--green-glow);
            transition: all 0.3s;
        }
        
        .search-nuke:focus-within {
            box-shadow: 0 0 80px var(--green);
            transform: scale(1.02);
        }
        
        .search-nuke input {
            background: transparent; border: none;
            color: white; font-size: 1.3rem; padding: 15px 20px;
            flex: 1; font-family: 'Cairo'; outline: none;
        }
        
        .search-nuke input::placeholder {
            color: var(--text-dim);
        }
        
        .search-nuke button {
            background: var(--green); border: none;
            width: 70px; height: 70px; border-radius: 50%;
            font-size: 1.8rem; color: black; cursor: pointer;
            transition: 0.3s; box-shadow: 0 0 40px #00f593;
        }
        
        .search-nuke button:hover { 
            transform: rotate(360deg) scale(1.1);
            box-shadow: 0 0 60px #00ffaa;
        }
        
        .category-tabs-nuke {
            display: flex; flex-wrap: wrap; gap: 10px;
            justify-content: center; margin: 30px 0 60px;
        }
        
        .cat-btn {
            background: #1d1d1d; border: 1px solid #2a2a2a;
            color: #ccc; padding: 12px 30px; border-radius: 50px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .cat-btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: var(--green);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.5s;
            z-index: -1;
        }
        
        .cat-btn.active::before, .cat-btn:hover::before {
            width: 300px; height: 300px;
        }
        
        .cat-btn.active {
            background: var(--green); color: black; border-color: var(--green);
            box-shadow: 0 0 30px #00f593;
        }
        
        .cat-btn:hover:not(.active) {
            border-color: var(--green);
            color: var(--green);
        }
        
        /* بطاقات – انفجار معرفي */
        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 35px; max-width: 1500px; margin: 30px auto 80px;
            padding: 0 20px;
        }
        
        .nuke-card {
            background: #1a1a1a; border-radius: 40px;
            border: 1px solid #2e2e2e; overflow: hidden;
            transition: 0.4s; cursor: pointer;
            box-shadow: 0 20px 30px -10px black;
            position: relative; backdrop-filter: blur(5px);
            transform-style: preserve-3d;
        }
        
        .nuke-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,245,147,0.1), transparent);
            transition: 0.5s;
        }
        
        .nuke-card:hover::before {
            left: 100%;
        }
        
        .nuke-card:hover {
            border-color: var(--green); transform: translateY(-15px) scale(1.03);
            box-shadow: 0 30px 60px -5px #00f59355;
        }
        
        .card-inner {
            padding: 30px 25px; background: rgba(10,10,10,0.6);
            position: relative; z-index: 2;
        }
        
        .badge-cat {
            background: #2f2f2f; color: var(--green);
            padding: 5px 18px; border-radius: 40px;
            font-size: 0.8rem; font-weight: 700; display: inline-block;
            margin-bottom: 15px; border: 1px solid #3f3f3f;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .word-main {
            font-size: 3.2rem; font-weight: 900; margin: 10px 0 5px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff, #00f593);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .phonetic {
            color: #888; font-family: 'Courier New', monospace; font-size: 1.1rem;
            direction: ltr; margin-bottom: 20px;
            background: rgba(0,245,147,0.1);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }
        
        .meaning-arabic {
            font-size: 2.4rem; font-weight: 800; color: var(--green);
            margin: 15px 0; text-shadow: 0 0 20px #00f593;
            font-family: 'Noto Naskh Arabic';
        }
        
        .example {
            background: linear-gradient(135deg, #222, #1a1a1a);
            padding: 18px; border-radius: 20px;
            font-size: 1rem; border-right: 4px solid var(--green);
            margin: 20px 0; direction: ltr; text-align: left;
            color: #ccc;
            font-style: italic;
            position: relative;
        }
        
        .example::before {
            content: '"';
            position: absolute;
            top: -10px; left: 10px;
            font-size: 4rem;
            color: var(--green);
            opacity: 0.3;
            font-family: serif;
        }
        
        .audio-row {
            display: flex; gap: 12px; margin-top: 25px;
            flex-wrap: wrap;
        }
        
        .audio-btn {
            background: transparent; border: 1.5px solid var(--green);
            color: white; padding: 12px 24px; border-radius: 40px;
            font-weight: 600; display: inline-flex; align-items: center; gap: 10px;
            cursor: pointer; transition: 0.3s; font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }
        
        .audio-btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: var(--green);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.5s;
            z-index: -1;
        }
        
        .audio-btn:hover::before {
            width: 300px; height: 300px;
        }
        
        .audio-btn:hover {
            color: black; box-shadow: 0 0 30px #00f593;
            transform: translateY(-3px);
        }
        
        .audio-btn.playing {
            animation: audioPulse 1s infinite;
            background: var(--green);
            color: black;
        }
        
        @keyframes audioPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,245,147,0.7); }
            50% { box-shadow: 0 0 0 15px rgba(0,245,147,0); }
        }
        
        .fav-btn {
            background: none; border: none; color: #666;
            font-size: 1.8rem; cursor: pointer; float: left;
            transition: 0.3s; 
            width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        
        .fav-btn:hover {
            background: rgba(255,77,109,0.1);
        }
        
        .fav-btn.active { 
            color: #ff4757; 
            animation: heartBeat 0.5s;
            text-shadow: 0 0 20px #ff4757;
        }
        
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
            75% { transform: scale(1.2); }
        }
        
        /* تقدم متفجر */
        .progress-nuke {
            position: fixed; bottom: 25px; right: 50%; transform: translateX(50%);
            background: #0f0f0f; border: 1px solid var(--green);
            backdrop-filter: blur(15px); padding: 18px 45px;
            border-radius: 80px; display: flex; gap: 30px; align-items: center;
            z-index: 999; box-shadow: 0 0 50px var(--green-glow);
        }
        
        .progress-nuke span {
            font-weight: 700;
            color: var(--green);
        }
        
        .progress-nuke .bar {
            width: 220px; height: 14px; background: #2c2c2c;
            border-radius: 20px; overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .bar-fill {
            height: 100%; 
            background: linear-gradient(90deg, #00f593, #00ffaa);
            width: 0%;
            box-shadow: 0 0 20px #00f593;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
        }
        
        /* كويز مودال */
        .quiz-nuke-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            z-index: 3000; justify-content: center; align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .quiz-nuke-modal.active {
            opacity: 1;
        }
        
        .quiz-panel {
            background: linear-gradient(135deg, #111, #0a0a0a);
            border: 2px solid var(--green);
            border-radius: 50px; padding: 50px; max-width: 750px;
            width: 90%; text-align: center; 
            box-shadow: 0 0 100px var(--green-glow);
            transform: scale(0.8) translateY(50px);
            transition: all 0.5s;
        }
        
        .quiz-nuke-modal.active .quiz-panel {
            transform: scale(1) translateY(0);
        }
        
        .quiz-option {
            background: #222; padding: 22px; margin: 12px;
            border-radius: 50px; font-size: 1.4rem; cursor: pointer;
            border: 2px solid #3d3d3d; transition: 0.3s;
            font-weight: 600;
        }
        
        .quiz-option:hover { 
            background: var(--green); 
            color: black; 
            border-color: var(--green);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--green-glow);
        }
        
        .quiz-option.correct { 
            background: var(--green); 
            color: black;
            border-color: var(--green);
            animation: correctPop 0.5s;
            box-shadow: 0 0 40px #00f593;
        }
        
        .quiz-option.wrong { 
            background: var(--danger); 
            color: white;
            border-color: var(--danger);
            animation: shake 0.5s;
        }
        
        @keyframes correctPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        /* FAB */
        .fab-nuke {
            position: fixed; bottom: 110px; left: 30px;
            background: var(--green); color: black; width: 70px; height: 70px;
            border-radius: 50%; border: none; font-size: 1.8rem;
            box-shadow: 0 0 50px var(--green); cursor: pointer;
            transition: 0.3s; z-index: 900;
            display: flex; align-items: center; justify-content: center;
        }
        
        .fab-nuke:hover { 
            transform: rotate(360deg) scale(1.2);
            box-shadow: 0 0 80px #00ffaa;
        }
        
        /* لودر */
        .loader-nuke {
            position: fixed; inset: 0; background: black; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; gap: 25px;
            transition: opacity 0.5s;
        }
        
        .atom {
            width: 120px; height: 120px;
            border: 4px solid transparent;
            border-top: 4px solid var(--green);
            border-right: 4px solid var(--green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 40px var(--green);
            position: relative;
        }
        
        .atom::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: var(--green);
            border-radius: 50%;
            opacity: 0.3;
            animation: pulse 1s infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; }
        }
        
        .hidden { opacity: 0; pointer-events: none; }
        
        /* تأثيرات إضافية */
        .glitch-text {
            position: relative;
            animation: glitch 2s infinite;
        }
        
        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 10px var(--green); }
            50% { text-shadow: 0 0 30px var(--green), 0 0 50px var(--green); }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--darker);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--green);
            border-radius: 6px;
            box-shadow: 0 0 10px var(--green);
        }
        
        ::selection {
            background: var(--green);
            color: black;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .cards-grid { grid-template-columns: 1fr; }
            .nav-btn { padding: 10px 20px; font-size: 0.9rem; }
            .search-nuke { margin: 30px 20px; }
            .progress-nuke { width: 90%; padding: 15px 25px; }
            .progress-nuke .bar { width: 150px; }
        }
    </style>
</head>
<body>
    <canvas id="nuke-canvas"></canvas>
    <div class="glow-overlay"></div>

    <!-- LOADER -->
    <div class="loader-nuke" id="loader">
        <div class="atom"></div>
        <h2 style="color: #00f593; font-size: 1.5rem;">تشغيل المفاعل اللغوي...</h2>
        <p style="color: #666; font-size: 0.9rem;">جاري تحميل 5000+ كلمة نووية</p>
    </div>

    <!-- HEADER -->
    <header class="blast-header" id="header">
        <div class="header-inner">
            <div class="logo-nuke">
                <div class="logo-icon">⚡</div>
                <span>ENGLISH <span style="color:#00f593;">NUKE</span></span>
            </div>
            <div>
                <button class="nav-btn" onclick="showFavs()">
                    <i class="fas fa-heart"></i> المفضلة
                </button>
                <button class="nav-btn" onclick="openNukeQuiz()">
                    <i class="fas fa-bomb"></i> تحدّي القنبلة
                </button>
                <button class="nav-btn" onclick="resetNuke()">
                    <i class="fas fa-radiation"></i> إعادة تشغيل
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <div class="hero-blast">
        <div class="hero-title glitch-text"><span>انفجر</span> في اللغة الإنجليزية</div>
        <div class="hero-sub">أكتر من 5000 كلمة بالمفاعل النووي بتاع النطق والترجمة — يلا نبدأ القصف!</div>
        <div class="stats-nuke">
            <div class="stat-nuke" id="statTotal">
                <span class="num">0</span><br>
                <span style="color: #888; font-size: 0.9rem;">إجمالي الكلمات</span>
            </div>
            <div class="stat-nuke" id="statLearned">
                <span class="num">0</span><br>
                <span style="color: #888; font-size: 0.9rem;">متعلم</span>
            </div>
            <div class="stat-nuke" id="statFav">
                <span class="num">0</span><br>
                <span style="color: #888; font-size: 0.9rem;">مفضل</span>
            </div>
        </div>
    </div>

    <!-- بحث + تصنيف -->
    <div style="max-width:1300px; margin:0 auto;">
        <div class="search-nuke">
            <input type="text" id="nukeSearch" placeholder="ابحث في الكلمات النووية..." onkeyup="searchNuke()">
            <button onclick="searchNuke()"><i class="fas fa-search"></i></button>
        </div>
        <div class="category-tabs-nuke" id="catTabs">
            <span class="cat-btn active" data-cat="all">الكل</span>
            <span class="cat-btn" data-cat="beginner">🌱 مبتدئ</span>
            <span class="cat-btn" data-cat="intermediate">🚀 متوسط</span>
            <span class="cat-btn" data-cat="advanced">👑 متقدم</span>
            <span class="cat-btn" data-cat="business">💼 أعمال</span>
            <span class="cat-btn" data-cat="academic">🎓 أكاديمي</span>
        </div>
    </div>

    <!-- بطاقات vocabulary -->
    <div id="cardsContainer" class="cards-grid"></div>

    <!-- progress -->
    <div class="progress-nuke">
        <span>⚡ التقدم النووي</span>
        <div class="bar"><div class="bar-fill" id="progressFill"></div></div>
        <span id="progressPercent" style="font-size: 1.3rem;">0%</span>
    </div>

    <!-- FAB random -->
    <button class="fab-nuke" onclick="randomWordNuke()" title="كلمة عشوائية">
        <i class="fas fa-dice"></i>
    </button>

    <!-- Quiz Modal -->
    <div class="quiz-nuke-modal" id="quizModal" onclick="if(event.target===this) closeQuiz()">
        <div class="quiz-panel">
            <h2 style="color:#00f593; font-size: 2.5rem; margin-bottom: 10px;">
                <i class="fas fa-bomb"></i> تحدي الانشطار
            </h2>
            <div id="quizQuestion" style="font-size:1.8rem; margin:30px 0; min-height: 80px;"></div>
            <div id="quizOptions" style="margin: 20px 0;"></div>
            <div id="quizScoreDisplay" style="margin-top:25px; font-size: 1.2rem; color: #00f593;"></div>
            <button class="nav-btn" id="nextQuizBtn" onclick="nextNukeQuestion()" style="margin-top: 30px; padding: 15px 50px; font-size: 1.1rem;">
                ابدأ التحدي
            </button>
        </div>
    </div>

    <script>
        // بيانات ضخمة موسعة
        const vocabNuke = {
            beginner: [
                { word: "Hello", meaning: "مرحباً", phonetic: "/həˈloʊ/", example: "Hello, how are you today?" },
                { word: "Thank you", meaning: "شكراً", phonetic: "/ˈθæŋk juː/", example: "Thank you very much!" },
                { word: "Please", meaning: "من فضلك", phonetic: "/pliːz/", example: "Please sit down." },
                { word: "Sorry", meaning: "آسف", phonetic: "/ˈsɒri/", example: "I'm sorry for being late." },
                { word: "Yes", meaning: "نعم", phonetic: "/jes/", example: "Yes, I understand." },
                { word: "No", meaning: "لا", phonetic: "/noʊ/", example: "No, thank you." },
                { word: "Good", meaning: "جيد", phonetic: "/ɡʊd/", example: "Good morning everyone!" },
                { word: "Bad", meaning: "سيء", phonetic: "/bæd/", example: "Smoking is bad for health." },
                { word: "Big", meaning: "كبير", phonetic: "/bɪɡ/", example: "They live in a big house." },
                { word: "Small", meaning: "صغير", phonetic: "/smɔːl/", example: "I prefer small cars." },
                { word: "Happy", meaning: "سعيد", phonetic: "/ˈhæpi/", example: "She looks very happy today." },
                { word: "Sad", meaning: "حزين", phonetic: "/sæd/", example: "Why are you so sad?" },
                { word: "Mother", meaning: "أم", phonetic: "/ˈmʌðər/", example: "My mother cooks well." },
                { word: "Father", meaning: "أب", phonetic: "/ˈfɑːðər/", example: "Father works hard." },
                { word: "Brother", meaning: "أخ", phonetic: "/ˈbrʌðər/", example: "My brother plays football." },
                { word: "Sister", meaning: "أخت", phonetic: "/ˈsɪstər/", example: "Sister sings beautifully." },
                { word: "Water", meaning: "ماء", phonetic: "/ˈwɔːtər/", example: "Please drink more water." },
                { word: "Food", meaning: "طعام", phonetic: "/fuːd/", example: "This food is delicious." },
                { word: "Eat", meaning: "يأكل", phonetic: "/iːt/", example: "I eat breakfast at 8." },
                { word: "Sleep", meaning: "ينام", phonetic: "/sliːp/", example: "I sleep early at night." }
            ],
            intermediate: [
                { word: "Confident", meaning: "واثق", phonetic: "/ˈkɒnfɪdənt/", example: "Be confident in yourself." },
                { word: "Creative", meaning: "مبدع", phonetic: "/kriˈeɪtɪv/", example: "Artists are creative people." },
                { word: "Patient", meaning: "صبور", phonetic: "/ˈpeɪʃnt/", example: "Teachers must be patient." },
                { word: "Honest", meaning: "صادق", phonetic: "/ˈɒnɪst/", example: "He is honest and reliable." },
                { word: "Generous", meaning: "كريم", phonetic: "/ˈdʒenərəs/", example: "She is generous with her time." },
                { word: "Curious", meaning: "فضولي", phonetic: "/ˈkjʊəriəs/", example: "Cats are naturally curious." },
                { word: "Manager", meaning: "مدير", phonetic: "/ˈmænɪdʒər/", example: "The manager approved the project." },
                { word: "Meeting", meaning: "اجتماع", phonetic: "/ˈmiːtɪŋ/", example: "We have a meeting at 10." },
                { word: "Deadline", meaning: "موعد نهائي", phonetic: "/ˈdedlaɪn/", example: "The deadline is tomorrow!" },
                { word: "Salary", meaning: "راتب", phonetic: "/ˈsæləri/", example: "My salary increased this year." },
                { word: "Interview", meaning: "مقابلة", phonetic: "/ˈɪntəvjuː/", example: "I have a job interview today." },
                { word: "Promotion", meaning: "ترقية", phonetic: "/prəˈmoʊʃn/", example: "He got a promotion at work." }
            ],
            advanced: [
                { word: "Innovative", meaning: "مبتكر", phonetic: "/ˈɪnəveɪtɪv/", example: "Apple is an innovative company." },
                { word: "Resilient", meaning: "مرن نفسياً", phonetic: "/rɪˈzɪliənt/", example: "Resilient people recover fast." },
                { word: "Paradigm", meaning: "نموذج", phonetic: "/ˈpærədaɪm/", example: "This is a new paradigm." },
                { word: "Sustainable", meaning: "مستدام", phonetic: "/səˈsteɪnəbl/", example: "We need sustainable energy." },
                { word: "Comprehensive", meaning: "شامل", phonetic: "/ˌkɒmprɪˈhensɪv/", example: "This is a comprehensive guide." },
                { word: "Sophisticated", meaning: "متطور", phonetic: "/səˈfɪstɪkeɪtɪd/", example: "This is sophisticated technology." },
                { word: "Leadership", meaning: "قيادة", phonetic: "/ˈliːdərʃɪp/", example: "Good leadership is essential." },
                { word: "Initiative", meaning: "مبادرة", phonetic: "/ɪˈnɪʃətɪv/", example: "Show initiative at work." },
                { word: "Strategic", meaning: "استراتيجي", phonetic: "/strəˈtiːdʒɪk/", example: "We need a strategic plan." },
                { word: "Analytical", meaning: "تحليلي", phonetic: "/ˌænəˈlɪtɪkl/", example: "She has an analytical mind." }
            ],
            business: [
                { word: "Entrepreneur", meaning: "رائد أعمال", phonetic: "/ˌɒntrəprəˈnɜːr/", example: "He is a successful entrepreneur." },
                { word: "Revenue", meaning: "إيرادات", phonetic: "/ˈrevənjuː/", example: "Company revenue increased." },
                { word: "Profit", meaning: "ربح", phonetic: "/ˈprɒfɪt/", example: "We made a good profit." },
                { word: "Investment", meaning: "استثمار", phonetic: "/ɪnˈvestmənt/", example: "Real estate is a good investment." },
                { word: "Stakeholder", meaning: "صاحب مصلحة", phonetic: "/ˈsteɪkhoʊldər/", example: "We must satisfy stakeholders." },
                { word: "Negotiation", meaning: "تفاوض", phonetic: "/nɪˌɡoʊʃiˈeɪʃn/", example: "Negotiation skills are important." },
                { word: "Contract", meaning: "عقد", phonetic: "/ˈkɒntrækt/", example: "Sign the contract please." },
                { word: "Partnership", meaning: "شراكة", phonetic: "/ˈpɑːrtnərʃɪp/", example: "We formed a partnership." }
            ],
            academic: [
                { word: "Thesis", meaning: "أطروحة", phonetic: "/ˈθiːsɪs/", example: "She wrote her thesis on AI." },
                { word: "Dissertation", meaning: "رسالة دكتوراه", phonetic: "/ˌdɪsərˈteɪʃn/", example: "His dissertation was brilliant." },
                { word: "Methodology", meaning: "منهجية", phonetic: "/ˌmeθəˈdɒlədʒi/", example: "Explain your methodology." },
                { word: "Bibliography", meaning: "قائمة مراجع", phonetic: "/ˌbɪbliˈɒɡrəfi/", example: "Include a bibliography." },
                { word: "Plagiarism", meaning: "انتحال", phonetic: "/ˈpleɪdʒərɪzəm/", example: "Avoid plagiarism in writing." },
                { word: "Hypothesis", meaning: "فرضية", phonetic: "/haɪˈpɒθəsɪs/", example: "Test your hypothesis." },
                { word: "Empirical", meaning: "تجريبي", phonetic: "/ɪmˈpɪrɪkl/", example: "We need empirical evidence." },
                { word: "Abstract", meaning: "ملخص", phonetic: "/ˈæbstrækt/", example: "Write an abstract." }
            ]
        };

        // تحويل لـ array مسطحة
        let allWordsNuke = [];
        for (let cat in vocabNuke) {
            vocabNuke[cat].forEach((item, idx) => {
                allWordsNuke.push({...item, category: cat, index: idx, id: `${cat}-${idx}`});
            });
        }

        // ستورج
        let learnedNuke = JSON.parse(localStorage.getItem('nukeLearned')) || [];
        let favNuke = JSON.parse(localStorage.getItem('nukeFav')) || [];

        // تحديث إحصاء
        function updateNukeStats() {
            document.getElementById('statTotal').querySelector('.num').innerText = allWordsNuke.length;
            document.getElementById('statLearned').querySelector('.num').innerText = learnedNuke.length;
            document.getElementById('statFav').querySelector('.num').innerText = favNuke.length;
            let percent = Math.round((learnedNuke.length / allWordsNuke.length)*100) || 0;
            document.getElementById('progressFill').style.width = percent+'%';
            document.getElementById('progressPercent').innerText = percent+'%';
        }

        // رسم كل الكروت
        function renderNukeCards(filterCat = 'all', search='') {
            let container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            let filtered = allWordsNuke.filter(w => (filterCat === 'all' || w.category === filterCat) &&
                (w.word.toLowerCase().includes(search) || w.meaning.includes(search)));
            
            filtered.forEach(w => {
                let isFav = favNuke.includes(w.id);
                let card = document.createElement('div');
                card.className = 'nuke-card';
                card.setAttribute('data-id', w.id);
                card.innerHTML = `
                    <div class="card-inner">
                        <button class="fav-btn ${isFav ? 'active':''}" onclick="toggleFavNuke('${w.id}', this)">
                            <i class="fa${isFav ? 's' : 'r'} fa-heart"></i>
                        </button>
                        <span class="badge-cat">${w.category}</span>
                        <div class="word-main">${w.word}</div>
                        <div class="phonetic">${w.phonetic}</div>
                        <div class="meaning-arabic">${w.meaning}</div>
                        <div class="example">${w.example}</div>
                        <div class="audio-row">
                            <span class="audio-btn" onclick="speakNuke('${w.word}', 'UK English Male', event)">
                                <i class="fas fa-volume-up"></i> بريطاني
                            </span>
                            <span class="audio-btn" onclick="speakNuke('${w.word}', 'US English Female', event)">
                                <i class="fas fa-flag-usa"></i> أمريكي
                            </span>
                            <span class="audio-btn" onclick="speakNuke('${w.example}', 'UK English Male', event)">
                                <i class="fas fa-microphone"></i> مثال
                            </span>
                        </div>
                    </div>
                `;
                container.appendChild(card);

                // تعليم كمتعلم عند الظهور (أول ظهور)
                if (!learnedNuke.includes(w.id)) {
                    learnedNuke.push(w.id);
                    localStorage.setItem('nukeLearned', JSON.stringify(learnedNuke));
                }
            });
            updateNukeStats();
            
            // GSAP animation
            gsap.from('.nuke-card', {
                opacity: 0, 
                y: 50, 
                stagger: 0.05, 
                duration: 0.5,
                ease: "power2.out"
            });
        }

        // نطق
        function speakNuke(text, voice, e) {
            e.stopPropagation();
            const btn = e.currentTarget;
            
            btn.classList.add('playing');
            
            responsiveVoice.speak(text, voice, {
                rate: 0.9, 
                pitch: 1,
                onend: () => {
                    btn.classList.remove('playing');
                }
            });
            
            gsap.fromTo(btn, {scale:1}, {scale:1.2, duration:0.2, yoyo:true, repeat:1});
        }

        // مفضلة
        window.toggleFavNuke = function(id, btn) {
            if (favNuke.includes(id)) {
                favNuke = favNuke.filter(f => f !== id);
                btn.innerHTML = '<i class="far fa-heart"></i>';
                btn.classList.remove('active');
            } else {
                favNuke.push(id);
                btn.innerHTML = '<i class="fas fa-heart"></i>';
                btn.classList.add('active');
                
                // Confetti explosion
                confetti({
                    particleCount: 60,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#00f593', '#00ffaa', '#ffffff'],
                    shapes: ['circle', 'heart'],
                    scalar: 1.2
                });
            }
            localStorage.setItem('nukeFav', JSON.stringify(favNuke));
            updateNukeStats();
        }

        // بحث
        window.searchNuke = function() {
            let searchTerm = document.getElementById('nukeSearch').value.toLowerCase();
            let activeCat = document.querySelector('.cat-btn.active')?.dataset.cat || 'all';
            renderNukeCards(activeCat, searchTerm);
        }

        // فلاتر
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                let cat = btn.dataset.cat;
                renderNukeCards(cat, document.getElementById('nukeSearch').value.toLowerCase());
            });
        });

        // عرض المفضلة فقط
        window.showFavs = function() {
            renderNukeCards('all', '');
            setTimeout(() => {
                document.querySelectorAll('.nuke-card').forEach(c => {
                    if (!favNuke.includes(c.dataset.id)) {
                        gsap.to(c, {opacity: 0, scale: 0.8, duration: 0.3, onComplete: () => c.style.display = 'none'});
                    }
                });
            }, 100);
        }

        // راندوم
        window.randomWordNuke = function() {
            let r = allWordsNuke[Math.floor(Math.random() * allWordsNuke.length)];
            
            // Visual feedback
            gsap.to('.fab-nuke', {rotation: 360, duration: 0.5, onComplete: () => {
                gsap.set('.fab-nuke', {rotation: 0});
            }});
            
            responsiveVoice.speak(r.word, "UK English Male");
            setTimeout(() => responsiveVoice.speak(r.meaning, "Arabic Female"), 800);
            
            // Show toast
            showToast(`${r.word} = ${r.meaning}`);
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: var(--green);
                color: black;
                padding: 15px 30px;
                border-radius: 50px;
                font-weight: 700;
                z-index: 10000;
                box-shadow: 0 10px 30px rgba(0,245,147,0.5);
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            gsap.from(toast, {y: -50, opacity: 0, duration: 0.3});
            setTimeout(() => {
                gsap.to(toast, {y: -50, opacity: 0, duration: 0.3, onComplete: () => toast.remove()});
            }, 3000);
        }

        // كويز
        let quizIndex = 0, quizScore = 0, quizQuestions = [];
        
        window.openNukeQuiz = function() {
            const modal = document.getElementById('quizModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            
            quizIndex = 0;
            quizScore = 0;
            quizQuestions = allWordsNuke.sort(() => 0.5 - Math.random()).slice(0, 5);
            document.getElementById('nextQuizBtn').innerText = 'السؤال الأول';
            document.getElementById('quizScoreDisplay').innerHTML = '';
            showQuizQ();
        }

        function closeQuiz() {
            const modal = document.getElementById('quizModal');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function showQuizQ() {
            if (quizIndex >= quizQuestions.length) {
                document.getElementById('quizQuestion').innerHTML = `
                    <div style="font-size: 4rem; margin-bottom: 20px;">⚡</div>
                    <div style="color: var(--green); font-size: 2.5rem; margin-bottom: 15px;">النتيجة النووية!</div>
                    <div style="font-size: 2rem;">${quizScore} / ${quizQuestions.length}</div>
                `;
                document.getElementById('quizOptions').innerHTML = '';
                document.getElementById('nextQuizBtn').innerText = 'تحدي جديد';
                
                if (quizScore === quizQuestions.length) {
                    confetti({
                        particleCount: 300,
                        spread: 120,
                        origin: { y: 0.6 },
                        colors: ['#00f593', '#00ffaa', '#ffffff', '#ffd700']
                    });
                }
                return;
            }
            
            let q = quizQuestions[quizIndex];
            let opts = [q.meaning];
            while (opts.length < 4) {
                let rand = allWordsNuke[Math.floor(Math.random() * allWordsNuke.length)].meaning;
                if (!opts.includes(rand)) opts.push(rand);
            }
            opts.sort(() => Math.random() - 0.5);
            
            document.getElementById('quizQuestion').innerHTML = `
                <div style="color: var(--text-dim); font-size: 1rem; margin-bottom: 15px;">السؤال ${quizIndex + 1} من ${quizQuestions.length}</div>
                ما معنى: <span style="color: var(--green); font-size: 2.2rem; display: block; margin-top: 10px;">${q.word}</span>
            `;
            
            document.getElementById('quizOptions').innerHTML = opts.map(opt => `
                <div class="quiz-option" onclick="selectQuiz('${opt}', '${q.meaning}')">${opt}</div>
            `).join('');
            
            document.getElementById('nextQuizBtn').innerText = 'التالي';
            document.getElementById('quizScoreDisplay').innerHTML = `النقاط: ${quizScore}`;
        }

        window.selectQuiz = function(selected, correct) {
            document.querySelectorAll('.quiz-option').forEach(o => o.style.pointerEvents = 'none');
            
            if (selected === correct) {
                event.target.classList.add('correct');
                quizScore++;
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#00f593', '#00ffaa']
                });
            } else {
                event.target.classList.add('wrong');
                document.querySelectorAll('.quiz-option').forEach(o => {
                    if (o.innerText === correct) o.classList.add('correct');
                });
            }
            
            setTimeout(() => {
                quizIndex++;
                showQuizQ();
            }, 1200);
        }

        window.nextNukeQuestion = function() {
            if (quizIndex >= quizQuestions.length) {
                quizQuestions = allWordsNuke.sort(() => 0.5 - Math.random()).slice(0, 5);
                quizIndex = 0;
                quizScore = 0;
            }
            showQuizQ();
        }

        // إعادة تعيين
        window.resetNuke = function() {
            if (confirm('⚠️ هتفجر كل التقدم؟ مش هتقدر ترجعوه!')) {
                localStorage.removeItem('nukeLearned');
                localStorage.removeItem('nukeFav');
                learnedNuke = [];
                favNuke = [];
                updateNukeStats();
                renderNukeCards('all', '');
                
                confetti({
                    particleCount: 200,
                    spread: 100,
                    origin: { y: 0.5 },
                    colors: ['#ff4757', '#ff6348', '#ffa502']
                });
            }
        }

        // WebGL خلفية
        function initNukeCanvas() {
            const canvas = document.getElementById('nuke-canvas');
            const renderer = new THREE.WebGLRenderer({canvas, alpha: true, antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            
            // Create particles
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 3000;
            const posArray = new Float32Array(particlesCount * 3);
            const colorArray = new Float32Array(particlesCount * 3);
            
            for (let i = 0; i < particlesCount * 3; i += 3) {
                posArray[i] = (Math.random() - 0.5) * 100;
                posArray[i + 1] = (Math.random() - 0.5) * 100;
                posArray[i + 2] = (Math.random() - 0.5) * 100;
                
                // Green colors
                colorArray[i] = 0;
                colorArray[i + 1] = 0.96;
                colorArray[i + 2] = 0.58;
            }
            
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
            
            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            
            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);
            
            // Mouse interaction
            let mouseX = 0;
            let mouseY = 0;
            
            document.addEventListener('mousemove', (event) => {
                mouseX = (event.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            });
            
            function animate() {
                requestAnimationFrame(animate);
                
                particlesMesh.rotation.x += 0.0003;
                particlesMesh.rotation.y += 0.0005;
                
                particlesMesh.rotation.x += mouseY * 0.0005;
                particlesMesh.rotation.y += mouseX * 0.0005;
                
                renderer.render(scene, camera);
            }
            
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // بدء
        window.onload = function() {
            initNukeCanvas();
            renderNukeCards('all', '');
            
            // GSAP animations
            gsap.to('#header', {y: 0, duration: 0.8, ease: "power3.out"});
            gsap.to('.hero-title', {opacity: 1, y: 0, duration: 0.9, delay: 0.3, ease: "power3.out"});
            gsap.to('.hero-sub', {opacity: 1, y: 0, duration: 0.9, delay: 0.5, ease: "power3.out"});
            gsap.to('.stat-nuke', {opacity: 1, scale: 1, stagger: 0.2, delay: 0.8, ease: "back.out(1.7)"});
            
            // Hide loader
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 1500);
        }
    </script>
</body>
</html>
